<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>School website</title>
    <link rel="stylesheet" href="mystyle.css">
</head>
<body>
    <header>
        <h1>NASRI PRIMARY AND SECONDARY SCHOOLS</h1>
        <nav>
            <a href="home.html">Home</a>
            <a href="about.html">About</a>
            <a href="register.html">Register</a>
            <a href="help.html">Help</a>
        </nav>
    </header>
    <div class="container3">
        
        <form>
            <h2 style="text-align: center;">Student registration form</h2>
        <br>
        <fieldset>
          <legend> Student sign up</legend>
            <label>Full name</label>
            <input type="text" placeholder="enter your name" required>
            <br>
            <label>Email address</label>
            <input type="email" placeholder="enter your email" required>
            <br>
            <label>Phone number</label>
            <input type="tel" placeholder="enter your number" required>
            <br>
            <label>Date of birth</label>
            <input type="date" required>
            <br>
            <label>Gender</label>
            <select required>
                <option value="">select gender</option>
                <option>male</option>
                <option>Female</option>

            </select>
             <br>
             <label>Classes</label>
             <select required>
                <option value="">select class</option>
                <option>Class 1</option>
                <option>Class 2</option>
                <option>Class 3</option>
                <option>Class 4</option>
                <option>Class 5</option>
                <option>Class 6</option>
                <option>Class 7</option>
                <option>Class 8</option>
                <option>Class 9</option>
                <option>Class 10</option>
                <option>Class 11</option>
                <option>Class 12</option>
             </select>
             <br>
             <label>Address</label>
             <textarea rows"4" placeholder="enter your address" required></textarea>
             <button type="submit"> Register now</button>
        </fieldset>
        </form>

    </div>
    <footer>
        <p>&copy; 2026 nasri future school. all rights reserved.</p>
    </footer>
</body>
</html>
